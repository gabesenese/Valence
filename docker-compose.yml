version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: valence_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: valence
      POSTGRES_PASSWORD: valence_dev
      POSTGRES_DB: valence_db
    ports:
      - '5432:5432'
    volumes:
      - valence_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U valence -d valence_db']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: valence_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@valence.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - valence_pgadmin:/var/lib/pgadmin

volumes:
  valence_pgdata:
  valence_pgadmin:
