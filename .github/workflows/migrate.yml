name: Migrate Database

# Applies pending Prisma migrations to the production database whenever a
# migration lands on main (or manually via the Run workflow button).
#
# Requires a repository secret named DATABASE_URL (Settings -> Secrets and
# variables -> Actions) containing the production connection string.
#
# Migrations were previously applied inside the Vercel build, but the build
# environment could not reach the database. Running them here decouples
# schema changes from the build entirely.

on:
  push:
    branches: [main]
    paths:
      - 'server/prisma/migrations/**'
  workflow_dispatch:

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply pending migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy --schema server/prisma/schema.prisma
