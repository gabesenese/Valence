name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # CI-only placeholders. Tests mock Prisma and never open a real connection;
      # env.ts just requires these to be present/long enough to parse.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci_only_placeholder_jwt_secret_0123456789
      JWT_REFRESH_SECRET: ci_only_placeholder_refresh_secret_0123456789
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=server

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Test
        run: npm run test --workspaces --if-present
